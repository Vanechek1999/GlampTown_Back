services:
  db:
    image: postgres:16-alpine
    container_name: glamping-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glamping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glamping}
      POSTGRES_DB: ${POSTGRES_DB:-glamping}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glamping} -d ${POSTGRES_DB:-glamping}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
